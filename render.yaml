# Render Blueprint for Nexus Bank System
# This file defines the infrastructure for the entire application

services:
  # Backend Django API
  - type: web
    name: nexus-bank-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn nexus_bank.wsgi:application"
    envVars:
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: nexus-bank-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: nexus-bank-db
          property: connectionString

  # Frontend React App (Static Site)
  - type: web
    name: nexus-bank-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: nexus-bank-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# PostgreSQL Database
databases:
  - name: nexus-bank-db
    plan: free
    region: oregon
